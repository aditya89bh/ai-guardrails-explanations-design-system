name: Markdown Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/markdown-lint.yml'
      - '.markdownlint.json'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/markdown-lint.yml'
      - '.markdownlint.json'

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Write markdownlint config
        run: |
          cat > .markdownlint.json << 'EOF'
          {
            "default": true,
            "MD013": false,
            "MD033": false,
            "MD041": false,
            "MD024": { "siblings_only": true },
            "MD007": { "indent": 2 },
            "MD012": false,
            "MD036": false
          }
          EOF

      - name: Lint all Markdown files
        run: |
          markdownlint-cli2 \
            "**/*.md" \
            "!node_modules/**" \
            "!playground/.next/**" \
            "!playground/node_modules/**" \
            "!tests/node_modules/**"

      - name: Report file count
        run: |
          count=$(find . -name "*.md" \
            -not -path "./node_modules/*" \
            -not -path "./playground/node_modules/*" \
            -not -path "./playground/.next/*" \
            -not -path "./tests/node_modules/*" | wc -l)
          echo "Linted $count Markdown files"
