name: Schema Validation

on:
  push:
    branches: [main]
    paths:
      - 'reference/json/**'
      - 'reference/examples/**'
      - 'reference/yaml/**'
      - '.github/workflows/schema-validation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'reference/json/**'
      - 'reference/examples/**'
      - 'reference/yaml/**'
      - '.github/workflows/schema-validation.yml'

jobs:
  validate:
    name: Validate Schemas, Payloads, and YAML Configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JSON schema files
        run: |
          echo "=== JSON Schema Validation ==="
          PASS=0
          FAIL=0
          for f in reference/json/*.schema.json; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "✓ $f"
              PASS=$((PASS + 1))
            else
              echo "✗ ERROR: $f — invalid JSON"
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "Schemas: $PASS passed, $FAIL failed"
          [ $FAIL -eq 0 ] || exit 1

      - name: Check example payload files
        run: |
          echo "=== Example Payload Validation ==="
          PASS=0
          FAIL=0
          for f in reference/examples/*.json; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "✓ $f"
              PASS=$((PASS + 1))
            else
              echo "✗ ERROR: $f — invalid JSON"
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "Payloads: $PASS passed, $FAIL failed"
          [ $FAIL -eq 0 ] || exit 1

      - name: Check YAML config files
        run: |
          echo "=== YAML Configuration Validation ==="
          pip install pyyaml --quiet
          PASS=0
          FAIL=0
          for f in reference/yaml/*.yaml; do
            if python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
              echo "✓ $f"
              PASS=$((PASS + 1))
            else
              echo "✗ ERROR: $f — invalid YAML"
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "YAML configs: $PASS passed, $FAIL failed"
          [ $FAIL -eq 0 ] || exit 1

      - name: Run schema and payload test suite
        run: |
          echo "=== Running test suites ==="
          cd tests
          npm ci --prefer-offline
          node --test schemas/schema.test.js payloads/payload.test.js yaml/yaml.test.js

      - name: Summary
        run: |
          schema_count=$(ls reference/json/*.schema.json 2>/dev/null | wc -l)
          payload_count=$(ls reference/examples/*.json 2>/dev/null | wc -l)
          yaml_count=$(ls reference/yaml/*.yaml 2>/dev/null | wc -l)
          echo ""
          echo "Validation complete:"
          echo "  JSON schemas:     $schema_count"
          echo "  Example payloads: $payload_count"
          echo "  YAML configs:     $yaml_count"
