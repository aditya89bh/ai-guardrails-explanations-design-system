name: Playground Build

on:
  push:
    branches: [main]
    paths:
      - 'playground/**'
      - '.github/workflows/playground-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'playground/**'
      - '.github/workflows/playground-build.yml'

jobs:
  build:
    name: Build Playground
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playground/package-lock.json

      - name: Install dependencies
        working-directory: playground
        run: npm ci --prefer-offline

      - name: Build playground
        working-directory: playground
        run: npm run build

      - name: Verify build output
        working-directory: playground
        run: |
          echo "Checking for build output..."
          if [ ! -d ".next" ]; then
            echo "ERROR: .next directory not found after build"
            exit 1
          fi
          echo "✓ Build output verified"

      - name: Verify engine module files
        run: |
          echo "Checking engine module files..."
          MISSING=0
          for f in \
            playground/engine/primitives.js \
            playground/engine/rules.js \
            playground/engine/evaluator.js \
            playground/engine/schema-bridge.js \
            playground/engine/config-bridge.js; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=$((MISSING + 1))
            else
              echo "✓ $f"
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "ERROR: $MISSING engine file(s) missing"
            exit 1
          fi
          echo "✓ All engine files present"

      - name: Verify data files
        run: |
          echo "Checking data files..."
          for f in \
            playground/data/patterns.js \
            playground/data/scenarios.js; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing data file: $f"
              exit 1
            fi
            echo "✓ $f"
          done
          echo "✓ All data files present"

      - name: Verify component files
        run: |
          echo "Checking playground component files..."
          MISSING=0
          for f in \
            playground/components/ErrorBoundary.jsx \
            playground/components/PrimitiveControls.jsx \
            playground/components/EnginePanel.jsx \
            playground/components/ResultPanel.jsx \
            playground/components/AuditPanel.jsx \
            playground/components/guardrail/WarningBanner.jsx \
            playground/components/guardrail/PermissionGate.jsx \
            playground/components/guardrail/ConfidenceBadge.jsx \
            playground/components/guardrail/RefusalCard.jsx \
            playground/components/guardrail/RecoveryPrompt.jsx \
            playground/components/guardrail/EscalationCard.jsx; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=$((MISSING + 1))
            else
              echo "✓ $f"
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "ERROR: $MISSING component file(s) missing"
            exit 1
          fi
          echo "✓ All component files present"

      - name: Run smoke tests
        run: |
          cd tests
          npm ci --prefer-offline
          node --test smoke/smoke.test.js
        env:
          NODE_OPTIONS: '--experimental-vm-modules'
